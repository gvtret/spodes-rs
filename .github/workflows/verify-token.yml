name: Verify crates.io token

# Manual, non-destructive check that the CARGO_REGISTRY_TOKEN secret
# authenticates against crates.io. `cargo owner --list` reads the crate owners
# using the token but publishes nothing and changes nothing.
on:
  workflow_dispatch:

jobs:
  verify:
    name: Authenticate with cargo owner --list
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check the token is set
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: |
          echo "::error::CARGO_REGISTRY_TOKEN is not set"
          exit 1
      - name: List crate owners (authenticated, read-only)
        run: cargo owner --list spodes-rs
