name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (show changes without committing)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Get current version
        id: current
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Calculate new version
        id: new
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.new.outputs.version }}"/' Cargo.toml

      - name: Update CHANGELOG.md
        run: |
          TODAY=$(date +%Y-%m-%d)
          OLD_VERSION="${{ steps.current.outputs.version }}"
          NEW_VERSION="${{ steps.new.outputs.version }}"

          # Add new section after [Unreleased]
          sed -i "/^## \[Unreleased\]/a\\
          \\
          ## [$NEW_VERSION] - $TODAY\\
          \\
          ### Changed\\
          \\
          - Typed COSEM attributes: added 38 strongly-typed structs for IEC 62056-6-2\\
          - Updated all class files to use typed structs instead of generic CosemDataType\\
          - Added 63 unit tests for typed attribute conversions\\
          - Added push_listener and push_sender examples" CHANGELOG.md

          # Update comparison links
          sed -i "s|^\[Unreleased\]:.*|[Unreleased]: https://github.com/gvtret/spodes-rs/compare/v$NEW_VERSION...HEAD|" CHANGELOG.md
          sed -i "/^\[0.4.0\]:/i\\
          [$NEW_VERSION]: https://github.com/gvtret/spodes-rs/compare/v$OLD_VERSION...v$NEW_VERSION" CHANGELOG.md

      - name: Show changes
        run: |
          echo "=== Cargo.toml ==="
          grep "^version" Cargo.toml
          echo ""
          echo "=== CHANGELOG.md (first 30 lines) ==="
          head -30 CHANGELOG.md

      - name: Commit and tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.new.outputs.version }}"
          git tag "v${{ steps.new.outputs.version }}"
          git push origin main --tags

      - name: Dry run notice
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "=== DRY RUN ==="
          echo "Version would be bumped from ${{ steps.current.outputs.version }} to ${{ steps.new.outputs.version }}"
          echo "No changes committed."
